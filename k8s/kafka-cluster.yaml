apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: github-events-realtime
  namespace: github-events-poc
  labels:
    strimzi.io/cluster: github-events-kafka
spec:
  partitions: 10
  replicas: 2
  config:
    retention.ms: 604800000  # 7 days in milliseconds
    segment.ms: 86400000      # 1 day
    compression.type: producer
    max.message.bytes: 1048576
    min.insync.replicas: 2
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: github-events-archive
  namespace: github-events-poc
  labels:
    strimzi.io/cluster: github-events-kafka
spec:
  partitions:  10
  replicas: 2
  config:
    retention.ms: 2592000000  # 30 days in milliseconds
    segment.ms: 86400000       # 1 day
    compression.type: producer
    max.message.bytes: 1048576
    min.insync.replicas: 2
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: controller
  namespace: github-events-poc
  labels:
    strimzi.io/cluster: github-events-kafka
spec:
  replicas: 2
  roles:
    - controller
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 100Gi
        kraftMetadata: shared
        deleteClaim: false
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: broker
  namespace: github-events-poc
  labels:
    strimzi.io/cluster: github-events-kafka
spec:
  replicas: 2
  roles:
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 100Gi
        kraftMetadata: shared
        deleteClaim: false
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: github-events-kafka
  namespace: github-events-poc
spec:
  kafka:
    version: 4.1.1
    metadataVersion: 4.1-IV1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: external
        port: 9094
        type: nodeport
        tls: false
    config:
      offsets.topic.replication.factor: 2
      transaction.state.log.replication.factor: 2
      transaction.state.log.min.isr: 2
      default.replication.factor: 2
      min.insync.replicas: 2
      log.retention.hours: 168  # 7 days
      log.segment.bytes: 1073741824
      log.retention.check.interval.ms: 300000
  entityOperator:
    topicOperator: {}
    userOperator: {}