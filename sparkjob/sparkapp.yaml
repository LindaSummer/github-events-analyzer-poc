apiVersion: v1
kind: ConfigMap
metadata:
  name: gh-archive-config
  namespace: github-events-poc
data:
  KAFKA_BOOTSTRAP: github-events-kafka-kafka-bootstrap:9092
  KAFKA_TOPIC: github-events-realtime
  KAFKA_STARTING_OFFSETS: latest
  S3_ENDPOINT: http://minio.minio:9000
  ICEBERG_WAREHOUSE: s3a://iceberg-data/gh-archive
  CHECKPOINT_LOCATION: s3a://checkpoints/gh-etl/
---
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: gh-archive-iceberg-etl3
  namespace: github-events-poc
spec:
  type: Python
  mode: cluster
  image: ghcr.io/yetanothercodeant/github-events-analyzer-spark:feat-sparkjob-e98db5d1101c
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/work-dir/etl.py
  pythonVersion: "3"
  sparkVersion: "3.5.1"
  deps:
    packages:
      # Use the 3.5 specific runtime for Iceberg
      - "org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2"
      # Use the 3.5.1 specific connector for Kafka
      - "org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1"
    repositories:
      - "https://maven.aliyun.com/repository/public"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 3
    onFailureRetryInterval: 30
    onSubmissionFailureRetries: 3
    onSubmissionFailureRetryInterval: 30
  sparkConf:
    spark.sql.extensions: org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
    spark.sql.catalog.warehouse: org.apache.iceberg.spark.SparkCatalog
    spark.sql.catalog.warehouse.type: hadoop
    spark.sql.catalog.warehouse.warehouse: "$(ICEBERG_WAREHOUSE)"
    spark.hadoop.fs.s3a.path.style.access: "true"
    spark.streaming.stopGracefullyOnShutdown: "true"
    spark.sql.streaming.forceDeleteTempCheckpointLocation: "true"
    # Force Ivy to use /tmp/ivy for everything
    "spark.driver.extraJavaOptions": "-Divy.cache.dir=/tmp/ivy -Divy.home=/tmp/ivy"
    "spark.executor.extraJavaOptions": "-Divy.cache.dir=/tmp/ivy -Divy.home=/tmp/ivy"
    # Additional Spark-specific ivy setting
    "spark.jars.ivy": "/tmp/ivy"
  driver:
    cores: 1
    memory: 2g
    serviceAccount: spark-operator-spark
    envFrom:
      - configMapRef:
          name: gh-archive-config
      - secretRef:
          name: s3-credentials
    volumeMounts:
      - name: workdir
        mountPath: /opt/spark/work-dir
      - name: ivy-cache
        mountPath: /tmp
    labels:
      role: driver
  executor:
    instances: 2
    cores: 1
    memory: 2g
    serviceAccount: spark-operator-spark
    envFrom:
      - configMapRef:
          name: gh-archive-config
      - secretRef:
          name: s3-credentials
    volumeMounts:
      - name: workdir
        mountPath: /opt/spark/work-dir
      - name: ivy-cache
        mountPath: /tmp
    labels:
      role: executor
  volumes:
    - name: workdir
      emptyDir: {}
    - name: ivy-cache
      emptyDir: {}
